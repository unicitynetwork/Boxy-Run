# fly.toml app configuration file generated for boxy-run on 2026-04-12T14:30:41+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'boxy-run'
primary_region = 'lhr'

[build]

[env]
  DB_PATH = '/data/boxyrun.db'
  LOBBY_CAPACITY = '32'
  MIN_PLAYERS = '2'
  PORT = '8080'
  STATIC_DIR = '/app'
  QUEUE_MIN_PLAYERS = '2'
  QUEUE_COUNTDOWN_MS = '30000'

[[mounts]]
  source = 'boxyrun_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
